# TODO посмотреть на gateway api
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{.Release.Name}}-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: client.d3.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{.Release.Name}}-service
                port:
                  number: 8080
