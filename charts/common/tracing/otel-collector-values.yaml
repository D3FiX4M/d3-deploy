mode: deployment

image:
  repository: "otel/opentelemetry-collector-contrib"

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

  processors:
    memory_limiter: {}
  
  exporters:
    otlp:
      endpoint: jaeger.d3-tracing.svc.cluster.local:4317
      tls:
        insecure: true
  
  service:
    pipelines:
      traces:
        receivers: [ otlp ]
        processors: [ memory_limiter ]
        exporters: [ otlp ]