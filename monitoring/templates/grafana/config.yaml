apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring
data:
  dashboards.yaml: |-
    {
      "apiVersion": 1,
      "datasources": [
        {
          "access": "proxy",
          "editable": false,
          "name": "prometheus",
          "orgId": 1,
          "type": "prometheus",
          "url": "http://prometheus:9090/prometheus",
          "version": 1
        },
        {
          "access": "proxy",
          "editable": false,
          "name": "loki",
          "orgId": 1,
          "type": "loki",
          "url": "http://loki:3100",
          "version": 1
        },
        {
          "access": "proxy",
          "editable": false,
          "name": "tempo",
          "orgId": 1,
          "type": "tempo",
          "url": "http://tempo:3200",
          "version": 1
        }
      ]
    }