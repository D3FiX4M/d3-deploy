apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: monitoring
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:

      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
          env:
            - name: MINIO_ROOT_USER
              value: d3fix4m
            - name: MINIO_ROOT_PASSWORD
              value: d3d3d3d3
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: "local-path"
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi