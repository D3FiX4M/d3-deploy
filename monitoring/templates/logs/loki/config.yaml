apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      replication_factor: 1
      path_prefix: /loki
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2020-05-15
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/index_cache
      aws:
        s3: ""
        endpoint: http://minio:9000
        access_key_id: d3fix4m
        secret_access_key: d3d3d3d3
        bucketnames: loki
        s3forcepathstyle: true
        region: us-east-1
        insecure: true

