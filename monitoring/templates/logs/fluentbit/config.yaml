apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Grace        30
        Log_Level    info
        Parsers_File parsers.conf

        storage.type filesystem
        storage.path /buffers
        storage.sync normal
        storage.checksum off

        HTTP_Server On
        HTTP_Listen  0.0.0.0
        HTTP_Port   2020

    [INPUT]
        Name              tail
        Tag               kube.*
        Parser            cri
        Path              /var/log/containers/*.log
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Refresh_Interval  5
        Rotate_Wait       30
        Skip_Long_Lines   On
        storage.type      filesystem

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off

    [FILTER]
        Name          parser
        Match         kube.*
        Key_Name      log
        Parser        java_business_log
        Reserve_Data  On

    [OUTPUT]
        Name            loki
        Match           *
        Host            loki
        Port            3100
        Labels          namespace=$kubernetes['namespace_name'],container=$kubernetes['container_name'],app=$kubernetes['labels']['app']
        Line_Format     json

  parsers.conf: |

    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name   java_business_log
        Format regex
        Regex  ^(?<time>\d{2}:\d{2}:\d{2}\.\d+)\s+\[(?<thread>[^\]]+)\]\s+(?<level>\w+)\s+(?<logger>[^\s]+)\s+(?<traceId>[a-f0-9]+)\s+(?<spanId>[a-f0-9]+)\s+-\s+(?<message>.*)$