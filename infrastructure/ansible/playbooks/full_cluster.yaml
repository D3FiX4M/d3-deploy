- name: "K3s Cluster: common tasks and users"
  hosts: all
  become: true
  roles:
    - common
    - users

- name: "K3s Cluster: master node"
  hosts: k3s_master
  become: true
  roles:
    - k3s_master
    - kubeconfig

- name: "K3s Cluster: worker nodes"
  hosts: k3s_worker
  become: true
  roles:
    - k3s_worker