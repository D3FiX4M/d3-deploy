name: CI ms-d3-client

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-update-helm:
    runs-on: ubuntu-latest

    steps:
      # ---------------- Checkout d3-deploy ----------------
      - name: Checkout d3-deploy repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ---------------- Clone ms-d3-client ----------------
      - name: Checkout ms-d3-client repository
        uses: actions/checkout@v3
        with:
          repository: D3FiX4M/ms-d3-client
          path: app
          token: ${{ secrets.GH_PAT }}

      # ---------------- Setup JDK ----------------
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # ---------------- Gradle Build ----------------
      - name: Build with Gradle
        run: ./app/gradlew bootJar

      - name: Set branch name for tag
        id: branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          BRANCH_NAME=${BRANCH_NAME#feature/}
          BRANCH_NAME=${BRANCH_NAME#release/}
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      # ---------------- Bump version and create tag ----------------
      - name: Bump version and create tag
        id: tag
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: ${{ steps.branch.outputs.branch_name }}.
          RELEASE_BRANCHES: "^release/.*"

      # ---------------- Setup Docker ----------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- Build & Push Docker ----------------
      - name: Build & Push Docker
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: d3fix4m/ms-d3-client:${{ steps.tag.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------- Install yq ----------------
      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y yq

      # ---------------- Update Helm values ----------------
      - name: Update Docker image tag in Helm values
        run: |
          yq -i -y ".image.tag = \"${{ steps.tag.outputs.new_tag }}\"" charts/d3-client/values.yaml

      # ---------------- Create Pull Request ----------------
      - name: Create Pull Request with updated Helm values
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "Update Docker image tag to ${{ steps.tag.outputs.new_tag }}"
          branch: "update-ms-d3-client-${{ steps.tag.outputs.new_tag }}"
          title: "Update ms-d3-client image tag to ${{ steps.tag.outputs.new_tag }}"
          body: "CI updated Docker image tag in Helm values."
          labels: "ci-update"
