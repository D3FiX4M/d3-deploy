apiVersion: v1
kind: Service
metadata:
  name: d3-kafka
  namespace: broker
spec:
  type: ClusterIP
  selector:
    app: d3-kafka
  ports:
    - port: 9092
      targetPort: 9092
      name: internal
    - port: 29092
      targetPort: 29092
      name: external
    - port: 9093
      targetPort: 9093
      name: controller
