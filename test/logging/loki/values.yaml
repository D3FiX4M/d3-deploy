loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  tracing:
    enabled: true
  querier:
    max_concurrent: 2

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
    s3:
      endpoint: minio.datasource.svc.cluster.local:9000
      accessKeyId: d3fix4m
      secretAccessKey: d3d3d3d3
      insecure: true
      s3ForcePathStyle: true

monitoring:
  serviceMonitor:
    enabled: true

minio:
  enabled: false

test:
  enabled: false
lokiCanary:
  enabled: false

chunksCache:
  writebackSizeLimit: 10
  allocatedMemory: 512
  allocatedCPU: 250m

resultsCache:
  allocatedMemory: 256
  allocatedCPU: 250m

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    storageClass: local-path
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

