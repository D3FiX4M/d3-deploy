apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: d3-ca-ss
  namespace: cert-manager
spec:
  selfSigned: { }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: d3-ca
  namespace: cert-manager
spec:
  isCA: true
  duration: 87600h
  subject:
    organizations:
      - "D3"
    organizationalUnits:
      - "Local development"
    localities:
      - "Moscow"
    countries:
      - "RU"
  commonName: "D3 dev CA"
  secretName: d3-ca
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 4096
    rotationPolicy: Always
  issuerRef:
    name: d3-ca-ss
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: d3-ca-issuer
spec:
  ca:
    secretName: d3-ca

