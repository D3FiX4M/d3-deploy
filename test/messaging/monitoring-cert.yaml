apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: messaging-tls
  namespace: messaging
spec:
  secretName: messaging-tls
  commonName: messaging.d3.local
  dnsNames:
    - kafka.d3.local
    - kafka-0.d3.local
  duration: 8760h
  issuerRef:
    name: d3-ca-issuer
    kind: ClusterIssuer
  privateKey:
    algorithm: RSA
    encoding: PKCS8