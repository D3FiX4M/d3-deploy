name: d3-observability

services:
  loki:
    image: grafana/loki:3.6.6
    container_name: loki
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.10.0
    container_name: tempo
    command: -config.file=/etc/config.yaml
    volumes:
      - ./tempo/config.yaml:/etc/config.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"

  mimir:
    image: grafana/mimir:3.0.3
    container_name: mimir
    command: -config.file=/etc/mimir/config.yaml
    ports:
      - "9009:9009"
    volumes:
      - ./mimir/config.yaml:/etc/mimir/config.yaml
      - mimir-data:/data

#  alloy:
#    image: grafana/alloy:latest
#    container_name: alloy
#    volumes:
#      - ./alloy/config.alloy:/etc/alloy/config.alloy
#    ports:
#      - "4318:4318"
#    depends_on:
#      - mimir
#      - loki
#      - tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.146.1
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml
    ports:
      - "4318:4318"

  grafana:
    image: grafana/grafana:12.4
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana:/etc/grafana/provisioning

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"


volumes:
  loki-data:
  tempo-data:
  mimir-data:
  minio-data: