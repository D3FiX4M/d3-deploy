auth_enabled: false

server:
  http_listen_port: 3100

common:
  replication_factor: 1
  path_prefix: /loki
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-05-15
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
  aws:
    s3: s3://d3fix4m:d3d3d3d3@d3.minio.local:9000/loki
    insecure: true

