receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlp_http/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  otlp_http/mimir:
    endpoint: "http://mimir:9009/otlp"
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [ otlp ]
      processors: [ ]
      exporters: [ otlp_http/loki ]
    traces:
      receivers: [ otlp ]
      processors: [ ]
      exporters: [ otlp/tempo ]
    metrics:
      receivers: [ otlp ]
      processors: [ ]
      exporters: [ otlp_http/mimir ]

